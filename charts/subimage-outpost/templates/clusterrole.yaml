{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "subimage-outpost.fullname" . }}
  labels:
    {{- include "subimage-outpost.labels" . | nindent 4 }}
rules:
# Core resources
- apiGroups: [""]
  resources: ["namespaces", "pods", "services", "serviceaccounts"]
  verbs: ["get", "list"]
# Nodes
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["list"]
{{- if .Values.rbac.secrets }}
# Secrets
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["list"]
{{- end }}
# ConfigMaps - for aws-auth
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
# Networking resources
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list"]
# Gateway API resources
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["gateways", "httproutes"]
  verbs: ["list"]
# RBAC resources
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list"]
# Non-resource URLs (API discovery and health endpoints)
- nonResourceURLs: ["/", "/api", "/apis", "/version", "/healthz"]
  verbs: ["get"]
{{- end }}
